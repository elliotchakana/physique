<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <rect width="180" height="180" rx="40" fill="#0c1710"/>
  <!-- Flexing arm silhouette - minimalist -->
  <g transform="translate(90,90)" fill="none" stroke="#5a9e72" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- forearm -->
    <line x1="-30" y1="30" x2="-10" y2="5"/>
    <!-- upper arm -->
    <line x1="-10" y1="5" x2="10" y2="20"/>
    <!-- bicep peak -->
    <path d="M-10,5 Q-5,-25 10,5" fill="none"/>
    <!-- shoulder cap (delt) -->
    <path d="M10,5 Q25,-15 10,20" fill="none"/>
    <!-- fist -->
    <circle cx="-30" cy="30" r="6" fill="#5a9e72"/>
  </g>
</svg>
